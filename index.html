<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ads Free Music Player - Premium</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        /* --- Modern CSS Setup --- */
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --text: #ffffff;
            --text-secondary: #b3b3b3;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: radial-gradient(circle at top left, #2c0e63 0%, #111 50%),
                        radial-gradient(circle at bottom right, #1d436b 0%, #111 80%);
            overflow: hidden;
            color: var(--text);
        }

        /* Frosted Glass Container */
        .player-card {
            background: var(--glass);
            backdrop-filter: blur(15px) saturate(180%);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 50px 40px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* Subtle Aurora Glow */
        .player-card::before {
            content: '';
            position: absolute;
            top: -150px;
            left: -100px;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(100px);
            opacity: 0.2;
            z-index: -1;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 40px;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        /* Dynamic Channel List Styling (generated by JS) */
        #channel-list {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* --- New Channel Button Styling --- */
        .channel-button {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px 24px;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.3s ease;
            outline: none;
        }

        /* Hover Effect: Glow and slight lift */
        .channel-button:hover {
            background-color: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 210, 255, 0.3);
            transform: translateY(-2px);
            box-shadow: 0 8px 24px rgba(0, 210, 255, 0.15);
        }

        .channel-text {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 400;
            transition: color 0.3s ease;
        }

        .channel-button:hover .channel-text {
            color: var(--text);
        }

        .play-icon {
            width: 32px;
            height: 32px;
            transition: transform 0.3s ease;
        }

        .channel-button:hover .play-icon {
            transform: scale(1.1);
        }

        /* --- Status Styling --- */
        /* Active (Playing) State for the text */
        .playing-text {
            color: var(--primary) !important;
            font-weight: 600;
        }

        /* Pulsing Animation for the active icon */
        .active-pulse {
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.15); opacity: 0.7; }
            100% { transform: scale(1); opacity: 1; }
        }

    </style>
</head>
<body>

    <div class="player-card">
        <h1>Ads Free Music</h1>

        <div id="channel-list">
            </div>

        <audio id="audio-player"></audio>
    </div>

    <script src="streams.js"></script>

</body>
</html>
