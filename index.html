<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ads Free Music Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00d2ff;
            --secondary: #3a7bd5;
            --text: #ffffff;
            --text-secondary: #b3b3b3;
            --glass: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px 15px; /* Side padding so it never touches the phone edge */
            background: radial-gradient(circle at top left, #2c0e63 0%, #111 50%),
                        radial-gradient(circle at bottom right, #1d436b 0%, #111 80%);
            background-attachment: fixed;
            color: var(--text);
            box-sizing: border-box;
        }

        .player-card {
            background: var(--glass);
            backdrop-filter: blur(15px) saturate(180%);
            border-radius: 24px;
            border: 1px solid var(--border);
            padding: 40px 30px;
            width: 100%;
            max-width: 480px;
            box-shadow: 0 16px 64px rgba(0, 0, 0, 0.5);
            text-align: center;
            position: relative;
            overflow: hidden;
            box-sizing: border-box; /* Forces padding to stay inside the width */
        }

        .player-card::before {
            content: '';
            position: absolute;
            top: -150px;
            left: -100px;
            width: 300px;
            height: 300px;
            background: var(--primary);
            filter: blur(100px);
            opacity: 0.2;
            z-index: -1;
        }

        h1 {
            font-size: 2.2rem;
            font-weight: 600;
            margin-top: 0;
            margin-bottom: 25px;
            background: linear-gradient(135deg, #fff 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -1px;
        }

        #channel-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 55vh; /* Fits nicely on mobile screens */
            overflow-y: auto;
            padding-right: 8px;
        }

        #channel-list::-webkit-scrollbar { width: 5px; }
        #channel-list::-webkit-scrollbar-track { background: rgba(255, 255, 255, 0.05); border-radius: 10px; }
        #channel-list::-webkit-scrollbar-thumb { background: rgba(0, 210, 255, 0.4); border-radius: 10px; }

        .channel-button {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.02);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 14px 20px;
            cursor: pointer;
            width: 100%;
            box-sizing: border-box;
            transition: all 0.3s ease;
            outline: none;
            /* No flex-shrink prevents the button from squishing */
        }

        .channel-text {
            font-size: 1.1rem;
            color: var(--text-secondary);
            font-weight: 400;
            text-align: left;
            word-break: break-word; /* Prevents long names from breaking the layout */
            padding-right: 15px;
        }

        .play-icon {
            width: 32px;
            height: 32px;
            flex-shrink: 0; /* Forces the play icon to stay a perfect circle */
        }

        .playing-text { color: var(--primary) !important; font-weight: 600; }
        .active-pulse { animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.15); opacity: 0.7; } 100% { transform: scale(1); opacity: 1; } }

        .footer {
            margin-top: 25px; 
            text-align: center;
            color: var(--text-secondary);
            font-size: 0.9rem;
            opacity: 0.6;
        }
        .footer span { color: var(--primary); font-weight: 600; }

        /* --- THE MOBILE FIXES --- */
        @media (max-width: 480px) {
            .player-card {
                padding: 30px 20px; /* Reduces inner spacing on small phones */
                border-radius: 20px;
            }
            h1 {
                font-size: 1.8rem; /* Scales the title down slightly */
                margin-bottom: 20px;
            }
            .channel-button {
                padding: 12px 16px; /* Tighter buttons to save space */
            }
            .channel-text {
                font-size: 1rem; /* Smaller text for mobile */
            }
            .play-icon {
                width: 28px;
                height: 28px;
            }
        }
    </style>
</head>
<body>

    <div class="player-card">
        <h1>Ads Free Music</h1>
        <div id="channel-list"></div>
        <audio id="audio-player"></audio>
    </div>

    <div class="footer">
        Crafted with ❤️ by <span>Piklu</span> &copy; 2026
    </div>

    <script src="streams.js"></script>

</body>
</html>
